backend:
  name: github
  repo: agisaacng1-alt/isanh-global
  branch: Principaux

media_folder: "Images/Téléchargements"
public_folder: "/images/téléchargements"

collections:
  - name: "Offres"
    label: "Nos Offres et Activités"
    folder: "Contenu/offres"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Titre de l'activity", name: "titre", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime" }
      - { label: "Image d'illustration", name: "image", widget: "image" }
      - { label: "Description de l'offre", name: "body", widget: "markdown" }
